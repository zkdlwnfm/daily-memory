<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Mode - DailyMemory</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#5516be",
              "on-secondary-container": "#fffbff",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#8455ef",
              "primary-fixed-dim": "#c0c1ff",
              "on-tertiary-container": "#fffbff",
              "on-secondary": "#ffffff",
              "on-surface": "#141b2b",
              "tertiary-container": "#b55d00",
              "on-error": "#ffffff",
              "surface-dim": "#d3daef",
              "tertiary-fixed-dim": "#ffb783",
              "on-primary-container": "#fffbff",
              "surface-container-highest": "#dce2f7",
              "surface-bright": "#f9f9ff",
              "background": "#f9f9ff",
              "on-primary-fixed": "#07006c",
              "surface-tint": "#494bd6",
              "inverse-surface": "#293040",
              "on-background": "#141b2b",
              "tertiary-fixed": "#ffdcc5",
              "primary": "#4648d4",
              "inverse-on-surface": "#edf0ff",
              "error-container": "#ffdad6",
              "surface-container-low": "#f1f3ff",
              "tertiary": "#904900",
              "primary-fixed": "#e1e0ff",
              "on-tertiary": "#ffffff",
              "secondary-fixed-dim": "#d0bcff",
              "inverse-primary": "#c0c1ff",
              "secondary": "#6b38d4",
              "on-primary": "#ffffff",
              "on-primary-fixed-variant": "#2f2ebe",
              "surface-container": "#e9edff",
              "on-error-container": "#93000a",
              "primary-container": "#6063ee",
              "surface": "#f9f9ff",
              "surface-container-high": "#e1e8fd",
              "on-tertiary-fixed-variant": "#703700",
              "surface-variant": "#dce2f7",
              "on-surface-variant": "#464554",
              "secondary-fixed": "#e9ddff",
              "error": "#ba1a1a",
              "outline": "#767586",
              "outline-variant": "#c7c4d7",
              "on-tertiary-fixed": "#301400",
              "on-secondary-fixed": "#23005c"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mic-shadow {
            box-shadow: 0 12px 48px -12px rgba(70, 72, 212, 0.4);
        }
        .glass-hint {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface flex flex-col min-h-screen">
<!-- HEADER: Transactional/Task focused so navigation shell is suppressed as per mandate -->
<header class="flex justify-between items-center w-full px-6 h-20">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors font-medium text-sm group active:scale-95 duration-200">
<span class="material-symbols-outlined text-lg">close</span>
<span>✕ Cancel</span>
</button>
<button class="text-primary hover:text-primary-container font-semibold text-sm tracking-tight transition-colors active:scale-95 duration-200">
            Type instead
        </button>
</header>
<!-- CENTER CONTENT: Visual Soul & Focus -->
<main class="flex-grow flex flex-col items-center justify-center px-8 relative">
<!-- Decorative Ambient Background Elements -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="flex flex-col items-center gap-10">
<!-- Large Circular Microphone Button -->
<div class="relative group">
<!-- Pulse rings (Decorative logic for "Idle" state) -->
<div class="absolute inset-0 rounded-full bg-primary/20 scale-125 opacity-40 blur-xl"></div>
<button class="relative w-[120px] h-[120px] rounded-full bg-primary flex items-center justify-center mic-shadow hover:bg-primary-container transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined text-white text-[48px]" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Label -->
<div class="text-center space-y-2">
<h1 class="font-headline font-bold text-2xl tracking-tight text-on-surface">Tap to record</h1>
<p class="text-on-surface-variant text-sm font-medium opacity-70">Capture a moment from your day</p>
</div>
</div>
</main>
<!-- BOTTOM HINT: Glassmorphism & Tonal Layering -->
<footer class="pb-16 px-6">
<div class="max-w-md mx-auto glass-hint rounded-3xl p-6 border border-white/40 shadow-sm flex items-start gap-4">
<div class="bg-tertiary-fixed w-10 h-10 rounded-2xl flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-tertiary-fixed text-xl" data-icon="lightbulb">lightbulb</span>
</div>
<div class="space-y-1">
<p class="text-on-surface font-medium text-[15px] leading-snug">
                    Just speak naturally. AI will extract people, places, and events.
                </p>
<p class="text-on-surface-variant text-xs opacity-60">
                    Your recording is private and encrypted.
                </p>
</div>
</div>
</footer>
<!-- Background Image / Texture Hint -->
<div class="fixed inset-0 pointer-events-none -z-20 opacity-30 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary-container/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
