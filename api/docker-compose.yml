services:
  api:
    build: .
    container_name: dailymemory-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
